<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin — OnePieceGuess</title>
  <link rel="icon" href="img/straw-hat-3.png" />
  <link rel="stylesheet" href="css/style.css" />
  <style>
    /* ── Admin layout ─────────────────────────────────────────────────────── */
    .admin-grid { display: grid; grid-template-columns: 1fr 1.6fr; gap: 1.5rem; }
    @media (max-width: 820px) { .admin-grid { grid-template-columns: 1fr; } }

    .panel {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1.5rem;
    }
    .panel h2 { color: var(--accent); margin-bottom: 1.25rem; font-size: 1.05rem; }

    /* ── Form ─────────────────────────────────────────────────────────────── */
    .field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: .7rem; }
    @media (max-width: 520px) { .field-grid { grid-template-columns: 1fr; } }

    .field-group { display: flex; flex-direction: column; gap: .3rem; }
    .field-group label { font-size: .75rem; color: var(--text-muted); text-transform: uppercase; letter-spacing: .4px; }
    .field-group input, .field-group select {
      padding: .55rem .75rem;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      font-size: .9rem;
      outline: none;
      transition: border-color .2s;
    }
    .field-group input:focus, .field-group select:focus { border-color: var(--accent); }
    .field-group.full { grid-column: 1 / -1; }
    .haki-checks { display: flex; gap: 1.25rem; align-items: center; padding: .5rem 0; }
    .check-label { display: flex; align-items: center; gap: .4rem; font-size: .9rem; color: var(--text); cursor: pointer; }
    .check-label input[type="checkbox"] { width: 16px; height: 16px; accent-color: var(--accent); cursor: pointer; }

    .form-actions { display: flex; gap: .75rem; margin-top: 1rem; flex-wrap: wrap; }
    .btn-primary {
      padding: .6rem 1.4rem; background: var(--accent); color: #000;
      border: none; border-radius: 6px; font-weight: 700; cursor: pointer; font-size: .9rem;
      transition: opacity .2s;
    }
    .btn-primary:hover    { opacity: .85; }
    .btn-primary:disabled { opacity: .4; cursor: not-allowed; }
    .btn-secondary {
      padding: .6rem 1.2rem; background: transparent;
      border: 1px solid var(--border); color: var(--text-muted);
      border-radius: 6px; cursor: pointer; font-size: .9rem;
      transition: border-color .2s, color .2s;
    }
    .btn-secondary:hover { border-color: var(--text-muted); color: var(--text); }

    .form-feedback {
      padding: .55rem .9rem; border-radius: 6px; font-size: .85rem;
      margin-top: .75rem; display: none;
    }
    .form-feedback.ok    { background: var(--correct); color: #d0ffd0; display: block; }
    .form-feedback.error { background: var(--wrong);   color: #ffd0d0; display: block; }
    .form-feedback.info  { background: #1a2a3a; color: #8ad4f0; display: block; }

    /* ── Characters list ─────────────────────────────────────────────────── */
    .char-search {
      display: flex; gap: .6rem; margin-bottom: .9rem;
    }
    .char-search input {
      flex: 1; padding: .55rem .75rem;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; color: var(--text); outline: none; font-size: .9rem;
      transition: border-color .2s;
    }
    .char-search input:focus { border-color: var(--accent); }

    .char-list { max-height: 520px; overflow-y: auto; }
    .char-item {
      display: flex; align-items: center; justify-content: space-between;
      padding: .5rem .75rem; border-radius: 6px;
      transition: background .15s; cursor: pointer; gap: .5rem;
    }
    .char-item:hover { background: var(--surface2); }
    .char-item.selected { background: var(--surface2); outline: 1px solid var(--accent); }
    .char-name { font-size: .9rem; flex: 1; }
    .char-aff  { font-size: .75rem; color: var(--text-muted); }
    .char-actions { display: flex; gap: .4rem; flex-shrink: 0; }

    .btn-edit {
      padding: .3rem .7rem; background: transparent;
      border: 1px solid #2a4a7a; color: #6ab; border-radius: 4px;
      font-size: .75rem; cursor: pointer; transition: background .15s;
    }
    .btn-edit:hover { background: #1a2a3a; }

    .btn-delete {
      padding: .3rem .7rem; background: transparent;
      border: 1px solid #7a2a2a; color: #f88; border-radius: 4px;
      font-size: .75rem; cursor: pointer; transition: background .15s;
    }
    .btn-delete:hover { background: #2a1a1a; }

    /* ── User management section ─────────────────────────────────────────── */
    .user-section { margin-top: 1.5rem; }
    .user-item {
      display: flex; align-items: center; gap: .75rem;
      padding: .5rem .75rem; border-bottom: 1px solid var(--border);
      font-size: .85rem;
    }
    .user-item:last-child { border-bottom: none; }
    .user-role { margin-left: auto; }
    .btn-delete-user {
      padding: .25rem .6rem; background: transparent;
      border: 1px solid #7a2a2a; color: #f88; border-radius: 4px;
      font-size: .75rem; cursor: pointer; transition: background .15s;
      flex-shrink: 0;
    }
    .btn-delete-user:hover { background: #2a1a1a; }
    .btn-delete-user:disabled { opacity: .4; cursor: not-allowed; }

    /* ── Styled confirm modal ─────────────────────────────────────────────── */
    #confirm-overlay {
      display: none;
      position: fixed; inset: 0;
      background: rgba(0,0,0,.65);
      backdrop-filter: blur(4px);
      z-index: 9999;
      align-items: center; justify-content: center;
    }
    #confirm-overlay.open { display: flex; }
    .confirm-box {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem 2.25rem;
      max-width: 400px; width: 90%;
      text-align: center;
      animation: fadeUp .2s ease;
    }
    .confirm-box p {
      color: var(--text); font-size: .98rem; line-height: 1.5;
      margin-bottom: 1.5rem;
    }
    .confirm-box strong { color: var(--accent); }
    .confirm-actions { display: flex; gap: .75rem; justify-content: center; }
    .confirm-actions .btn-danger {
      padding: .6rem 1.4rem; background: #7a2020; color: #ffdada;
      border: 1px solid #a03030; border-radius: 6px;
      font-weight: 700; cursor: pointer; font-size: .9rem;
      transition: background .2s;
    }
    .confirm-actions .btn-danger:hover { background: #9a2828; }
    .confirm-actions .btn-cancel2 {
      padding: .6rem 1.2rem; background: transparent;
      border: 1px solid var(--border); color: var(--text-muted);
      border-radius: 6px; cursor: pointer; font-size: .9rem;
      transition: border-color .2s, color .2s;
    }
    .confirm-actions .btn-cancel2:hover { border-color: var(--text-muted); color: var(--text); }
  </style>
</head>
<body>

  <header>
    <h1>One<span>Piece</span>Guess <span style="font-size:.8rem;color:var(--text-muted);font-weight:400">— Admin</span></h1>
    <nav>
      <a href="index.html">Jeu</a>
      <a href="test.html">Test API</a>
      <a href="admin.html" class="active">Admin</a>
      <div id="user-bar" style="display:inline-flex;align-items:center;gap:.75rem;margin-left:1rem;"></div>
    </nav>
  </header>

  <!-- ── Confirm modal ──────────────────────────────────────────────────── -->
  <div id="confirm-overlay">
    <div class="confirm-box">
      <p id="confirm-msg"></p>
      <div class="confirm-actions">
        <button class="btn-danger"  id="confirm-ok">Confirmer</button>
        <button class="btn-cancel2" id="confirm-cancel">Annuler</button>
      </div>
    </div>
  </div>

  <main>
    <div class="admin-grid">

      <!-- ── Panneau gauche : formulaire ────────────────────────────────── -->
      <div>
        <!-- Formulaire créer / modifier -->
        <div class="panel">
          <h2 id="form-title">➕ Ajouter un personnage</h2>
          <form id="char-form">
            <div class="field-grid">
              <div class="field-group full">
                <label>Personnage *</label>
                <input id="f-personnage" type="text" placeholder="ex: Monkey D. Luffy" required />
              </div>
              <div class="field-group">
                <label>Genre</label>
                <select id="f-genre">
                  <option>Masculin</option>
                  <option>Féminin</option>
                </select>
              </div>
              <div class="field-group">
                <label>Affiliation</label>
                <input id="f-affiliation" type="text" placeholder="Straw Hat Pirates" />
              </div>
              <div class="field-group">
                <label>Fruit du démon</label>
                <input id="f-fruit" type="text" placeholder="Aucun" />
              </div>
              <div class="field-group">
                <label>Type fruit</label>
                <select id="f-typeFruit">
                  <option>Aucun</option>
                  <option>Paramecia</option>
                  <option>Logia</option>
                  <option>Zoan</option>
                  <option>Ancient Zoan</option>
                  <option>Mythical Zoan</option>
                </select>
              </div>
              <div class="field-group full">
                <label>Haki</label>
                <div class="haki-checks">
                  <label class="check-label"><input type="checkbox" id="f-haki-conqueror" value="Conqueror" /> Conqueror</label>
                  <label class="check-label"><input type="checkbox" id="f-haki-observation" value="Observation" /> Observation</label>
                  <label class="check-label"><input type="checkbox" id="f-haki-armament" value="Armament" /> Armament</label>
                </div>
              </div>
              <div class="field-group">
                <label>Dernière prime (texte)</label>
                <input id="f-prime" type="text" placeholder="320 M" />
              </div>
              <div class="field-group">
                <label>Prime (valeur en B)</label>
                <input id="f-primeVal" type="number" placeholder="320000000" min="0" />
              </div>
              <div class="field-group">
                <label>Hauteur (texte)</label>
                <input id="f-hauteur" type="text" placeholder="1m74" />
              </div>
              <div class="field-group">
                <label>Hauteur (cm)</label>
                <input id="f-hauteurCm" type="number" placeholder="174" min="1" />
              </div>
              <div class="field-group">
                <label>Origine</label>
                <input id="f-origine" type="text" placeholder="East Blue" />
              </div>
              <div class="field-group">
                <label>Premier arc</label>
                <input id="f-arc" type="text" placeholder="Romance Dawn" />
              </div>
              <div class="field-group">
                <label>Début chapitre</label>
                <input id="f-chapitre" type="number" placeholder="1" min="1" />
              </div>
              <div class="field-group">
                <label>Début épisode</label>
                <input id="f-episode" type="number" placeholder="1" min="1" />
              </div>
            </div>

            <div class="form-actions">
              <button class="btn-primary" type="submit" id="form-submit-btn">Ajouter</button>
              <button class="btn-secondary" type="button" id="form-cancel-btn" style="display:none">Annuler</button>
            </div>
          </form>
          <div class="form-feedback" id="form-feedback"></div>
        </div>

        <!-- Créer un compte -->
        <div class="panel" style="margin-top:1.25rem;">
          <h2>👤 Créer un compte utilisateur</h2>
          <form id="user-form">
            <div class="field-grid">
              <div class="field-group"><label>Nom d'utilisateur</label><input id="u-name" type="text" required /></div>
              <div class="field-group"><label>Mot de passe</label><input id="u-pass" type="password" required /></div>
              <div class="field-group">
                <label>Rôle</label>
                <select id="u-role"><option value="user">user</option><option value="admin">admin</option></select>
              </div>
            </div>
            <div class="form-actions"><button class="btn-primary" type="submit">Créer le compte</button></div>
          </form>
          <div class="form-feedback" id="user-feedback"></div>
          <div class="user-section" id="user-list-section">
            <h2 style="color:var(--accent);margin-bottom:.75rem;font-size:.95rem;">Comptes existants</h2>
            <div id="user-list">Chargement…</div>
          </div>
        </div>
      </div>

      <!-- ── Panneau droit : liste des personnages ───────────────────────── -->
      <div class="panel" style="align-self:start">
        <h2>📋 Personnages (<span id="char-count">…</span>)</h2>
        <div class="char-search">
          <input id="char-filter" type="text" placeholder="Filtrer par nom…" />
        </div>
        <div class="char-list" id="char-list">Chargement…</div>
      </div>

    </div>
  </main>

  <script type="module">
    import { guardAdmin, renderUserBar } from './js/auth.js';
    import {
      fetchAllCharacters, createCharacter, updateCharacter, deleteCharacter,
      fetchMe, registerUser
    } from './js/api.js';

    // ── Guard ───────────────────────────────────────────────────────────────
    guardAdmin();
    renderUserBar();

    // ── State ───────────────────────────────────────────────────────────────
    let allChars   = [];
    let editingName = null; // null = mode création

    // ── DOM refs ─────────────────────────────────────────────────────────────
    const charList   = document.getElementById('char-list');
    const charCount  = document.getElementById('char-count');
    const filterEl   = document.getElementById('char-filter');
    const formTitle  = document.getElementById('form-title');
    const submitBtn  = document.getElementById('form-submit-btn');
    const cancelBtn  = document.getElementById('form-cancel-btn');
    const feedback   = document.getElementById('form-feedback');

    // ── Load characters ──────────────────────────────────────────────────────
    async function loadChars() {
      allChars = await fetchAllCharacters();
      charCount.textContent = allChars.length;
      renderList(allChars);
    }

    function renderList(chars) {
      if (!chars.length) { charList.innerHTML = '<p style="color:var(--text-muted);padding:.5rem">Aucun personnage.</p>'; return; }
      charList.innerHTML = chars.map(c => `
        <div class="char-item" data-name="${escHtml(c.personnage)}">
          <span class="char-name">${escHtml(c.personnage)}</span>
          <span class="char-aff">${escHtml(c.affiliation || '')}</span>
          <div class="char-actions">
            <button class="btn-edit"   data-action="edit"   data-name="${escHtml(c.personnage)}">✏️</button>
            <button class="btn-delete" data-action="delete" data-name="${escHtml(c.personnage)}">🗑️</button>
          </div>
        </div>
      `).join('');
    }

    // Filter
    filterEl.addEventListener('input', () => {
      const q = filterEl.value.toLowerCase();
      renderList(allChars.filter(c => c.personnage.toLowerCase().includes(q)));
    });

    // ── List actions (event delegation) ──────────────────────────────────────
    charList.addEventListener('click', async (e) => {
      const btn = e.target.closest('[data-action]');
      if (!btn) return;
      const name   = btn.dataset.name;
      const action = btn.dataset.action;

      if (action === 'edit') {
        const char = allChars.find(c => c.personnage === name);
        if (char) fillForm(char);
      }
      if (action === 'delete') {
        if (!await showConfirm(`Supprimer <strong>${name}</strong> ? Cette action est irréversible.`)) return;
        try {
          await deleteCharacter(name);
          showFeedback(`"${name}" supprimé ✓`, 'ok');
          await loadChars();
        } catch (err) {
          showFeedback(`❌ ${err.message}`, 'error');
        }
      }
    });

    // ── Form — CREATE / UPDATE ────────────────────────────────────────────────
    document.getElementById('char-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = getFormData();
      submitBtn.disabled = true;
      try {
        if (editingName) {
          await updateCharacter(editingName, data);
          showFeedback(`"${editingName}" mis à jour ✓`, 'ok');
          resetForm();
        } else {
          await createCharacter(data);
          showFeedback(`"${data.personnage}" ajouté ✓`, 'ok');
          resetForm();
        }
        await loadChars();
      } catch (err) {
        showFeedback(`❌ ${err.message}`, 'error');
      } finally {
        submitBtn.disabled = false;
      }
    });

    cancelBtn.addEventListener('click', resetForm);

    // ── Form helpers ──────────────────────────────────────────────────────────
    function fillForm(c) {
      editingName = c.personnage;
      formTitle.textContent = `✏️ Modifier : ${c.personnage}`;
      submitBtn.textContent = 'Mettre à jour';
      cancelBtn.style.display = '';

      document.getElementById('f-personnage').value = c.personnage           || '';
      document.getElementById('f-genre').value      = c.genre                || 'Masculin';
      document.getElementById('f-affiliation').value= c.affiliation          || '';
      document.getElementById('f-fruit').value      = c.fruitDuDemon         || 'Aucun';
      document.getElementById('f-typeFruit').value  = c.typeFruitDuDemon     || 'Aucun';
      const hakiVals = (c.haki || '').split(',').map(s => s.trim());
      document.getElementById('f-haki-conqueror').checked  = hakiVals.includes('Conqueror');
      document.getElementById('f-haki-observation').checked = hakiVals.includes('Observation');
      document.getElementById('f-haki-armament').checked   = hakiVals.includes('Armament');
      document.getElementById('f-prime').value      = c.dernierePrime        || '';
      document.getElementById('f-primeVal').value   = c.dernierePrimeValeur  || '';
      document.getElementById('f-hauteur').value    = c.hauteur              || '';
      document.getElementById('f-hauteurCm').value  = c.hauteurCm            || '';
      document.getElementById('f-origine').value    = c.origine              || '';
      document.getElementById('f-arc').value        = c.premierArc           || '';
      document.getElementById('f-chapitre').value   = c.debutChapitre        || '';
      document.getElementById('f-episode').value    = c.debutEpisode         || '';
      document.getElementById('f-personnage').focus();
    }

    function getFormData() {
      return {
        personnage:          document.getElementById('f-personnage').value.trim(),
        genre:               document.getElementById('f-genre').value,
        affiliation:         document.getElementById('f-affiliation').value.trim(),
        fruitDuDemon:        document.getElementById('f-fruit').value.trim()    || 'Aucun',
        typeFruitDuDemon:    document.getElementById('f-typeFruit').value,
        haki:                ['Conqueror','Observation','Armament']
                               .filter(h => document.getElementById('f-haki-'+h.toLowerCase()).checked)
                               .join(', ') || 'Aucun',
        dernierePrime:       document.getElementById('f-prime').value.trim(),
        dernierePrimeValeur: Number(document.getElementById('f-primeVal').value) || 0,
        hauteur:             document.getElementById('f-hauteur').value.trim(),
        hauteurCm:           Number(document.getElementById('f-hauteurCm').value) || 0,
        origine:             document.getElementById('f-origine').value.trim(),
        premierArc:          document.getElementById('f-arc').value.trim(),
        debutChapitre:       Number(document.getElementById('f-chapitre').value) || 0,
        debutEpisode:        Number(document.getElementById('f-episode').value)  || 0,
      };
    }

    function resetForm() {
      editingName = null;
      formTitle.textContent = '➕ Ajouter un personnage';
      submitBtn.textContent = 'Ajouter';
      cancelBtn.style.display = 'none';
      document.getElementById('char-form').reset();
      feedback.className = 'form-feedback';
    }

    function showFeedback(msg, type) {
      feedback.textContent = msg;
      feedback.className   = `form-feedback ${type}`;
      if (type === 'ok') setTimeout(() => { feedback.className = 'form-feedback'; }, 3000);
    }

    // ── User management ───────────────────────────────────────────────────────
    let currentUserId = null;
    fetchMe().then(me => { currentUserId = me.id; }).catch(() => {});

    async function loadUsers() {
      try {
        const res = await fetch('http://localhost:3001/api/auth/users', {
          headers: { Authorization: `Bearer ${localStorage.getItem('op_token')}` }
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const users = await res.json();
        document.getElementById('user-list').innerHTML = users.map(u => `
          <div class="user-item" data-uid="${u.id}">
            <span>👤 ${escHtml(u.username)}</span>
            <span style="color:var(--text-muted);font-size:.75rem">${u.createdAt?.slice(0,10) || ''}</span>
            <span class="user-role role-badge ${u.role}" style="margin-left:auto">${u.role}</span>
            <button class="btn-delete-user" data-uid="${u.id}" data-uname="${escHtml(u.username)}"
              ${u.id === currentUserId ? 'disabled title="Impossible de se supprimer soi-même"' : ''}
            >🗑️</button>
          </div>
        `).join('');
      } catch { /* ignore */ }
    }

    document.getElementById('user-list').addEventListener('click', async (e) => {
      const btn = e.target.closest('.btn-delete-user');
      if (!btn || btn.disabled) return;
      const uid   = Number(btn.dataset.uid);
      const uname = btn.dataset.uname;
      if (!await showConfirm(`Supprimer le compte <strong>${uname}</strong> ? Cette action est irréversible.`)) return;
      try {
        const res = await fetch(`http://localhost:3001/api/auth/users/${uid}`, {
          method: 'DELETE',
          headers: { Authorization: `Bearer ${localStorage.getItem('op_token')}` }
        });
        if (!res.ok) { const d = await res.json(); throw new Error(d.error || `HTTP ${res.status}`); }
        const fb = document.getElementById('user-feedback');
        fb.textContent = `✅ Compte "${uname}" supprimé`;
        fb.className   = 'form-feedback ok';
        setTimeout(() => { fb.className = 'form-feedback'; }, 3000);
        loadUsers();
      } catch (err) {
        const fb = document.getElementById('user-feedback');
        fb.textContent = `❌ ${err.message}`;
        fb.className   = 'form-feedback error';
      }
    });

    document.getElementById('user-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const fb = document.getElementById('user-feedback');
      try {
        const data = await registerUser(
          document.getElementById('u-name').value.trim(),
          document.getElementById('u-pass').value,
          document.getElementById('u-role').value
        );
        fb.textContent = `✅ Compte "${data.username}" créé`;
        fb.className   = 'form-feedback ok';
        document.getElementById('user-form').reset();
        loadUsers();
      } catch (err) {
        fb.textContent = `❌ ${err.message}`;
        fb.className   = 'form-feedback error';
      }
    });

    // ── Confirm modal ──────────────────────────────────────────────────────────
    function showConfirm(htmlMsg) {
      return new Promise(resolve => {
        const overlay = document.getElementById('confirm-overlay');
        document.getElementById('confirm-msg').innerHTML = htmlMsg;
        overlay.classList.add('open');
        const cleanup = (result) => {
          overlay.classList.remove('open');
          document.getElementById('confirm-ok').removeEventListener('click', onOk);
          document.getElementById('confirm-cancel').removeEventListener('click', onCancel);
          resolve(result);
        };
        const onOk     = () => cleanup(true);
        const onCancel = () => cleanup(false);
        document.getElementById('confirm-ok').addEventListener('click', onOk);
        document.getElementById('confirm-cancel').addEventListener('click', onCancel);
        overlay.addEventListener('click', (e) => { if (e.target === overlay) cleanup(false); }, { once: true });
      });
    }

    // ── Utilities ─────────────────────────────────────────────────────────────
    function escHtml(s) {
      return String(s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
    }

    // ── Boot ──────────────────────────────────────────────────────────────────
    loadChars();
    loadUsers();
  </script>
